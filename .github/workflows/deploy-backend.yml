name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    name: Deploy no VPS
    runs-on: ubuntu-latest

    steps:
      - name: Preparar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy → git pull + build + restart
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd /root/zapflow

            echo "▶ Puxando código..."
            git pull origin main

            echo "▶ Instalando dependências..."
            cd backend
            npm install --omit=dev --force

            echo "▶ Compilando TypeScript..."
            npm run build

            echo "▶ Reiniciando PM2..."
            pm2 restart zapflow-backend

            echo "✅ Deploy concluído"
          ENDSSH
