name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    name: Deploy no VPS
    runs-on: ubuntu-latest

    steps:
      - name: Preparar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy → git pull + build + restart
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd /root/zapflow

            echo "▶ Puxando código..."
            git pull origin main

            echo "▶ Verificando dependências..."
            cd backend
            if git diff HEAD~1 HEAD -- package.json | grep -q .; then
              echo "  package.json mudou, instalando pacotes..."
              npm install --legacy-peer-deps --no-package-lock
            else
              echo "  Sem mudanças em package.json, pulando."
            fi

            echo "▶ Compilando TypeScript..."
            npm run build

            echo "▶ Reiniciando PM2..."
            if pm2 describe zapvio-backend > /dev/null 2>&1; then
              pm2 restart zapvio-backend
            elif pm2 describe zapflow-backend > /dev/null 2>&1; then
              pm2 restart zapflow-backend
            else
              echo "  Processo não encontrado, iniciando novo..."
              pm2 start /root/zapflow/backend/dist/index.js --name zapflow-backend
              pm2 save
            fi

            echo "✅ Deploy concluído"
          ENDSSH
